services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    env_file:
      - .env
    ports:
      - 80:3000
    volumes:
      - ./config:/config
      - /vault:/vault
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
networks: {}
